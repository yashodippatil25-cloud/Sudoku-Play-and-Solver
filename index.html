<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku — Play & Solve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-light-blue" data-theme="light-blue">

  <!-- Screen Flash Overlay (mistake feedback) -->
  <div id="screenFlash"></div>

  <!-- Theme Switcher -->
  <div class="theme-bar">
    <span class="theme-label">Theme</span>
    <button class="theme-btn active" data-theme="light-blue" title="Light Blue">
      <span class="swatch"></span> Light Blue
    </button>
    <button class="theme-btn" data-theme="dark" title="Dark Mode">
      <span class="swatch"></span> Dark
    </button>
    <button class="theme-btn" data-theme="pink" title="Light Pink">
      <span class="swatch"></span> Pink
    </button>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">SUDOKU</h1>
      <p class="tagline">Play it. Solve it. Master it.</p>
    </div>
  </header>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="tab-btn active" id="tabPlay">▶ Play Mode</button>
    <button class="tab-btn" id="tabSolve">⬡ Solve Mode</button>
  </div>

  <!-- ===================== PLAY MODE ===================== -->
  <section class="panel active" id="panelPlay">
    <div class="play-controls">
      <div class="difficulty-group">
        <span class="control-label">Difficulty</span>
        <div class="diff-btns">
          <button class="diff-btn active" data-level="beginner">Beginner</button>
          <button class="diff-btn" data-level="normal">Normal</button>
          <button class="diff-btn" data-level="pro">Pro</button>
        </div>
      </div>
      <div class="action-group">
        <button class="action-btn" id="btnNewGame">New Game</button>
        <button class="action-btn secondary" id="btnResetPlay">Reset</button>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-icon">⏱</span>
        <span class="stat-val" id="timerDisplay">00:00</span>
      </div>
      <div class="stat">
        <span class="stat-icon">✗</span>
        <span class="stat-val"><span id="mistakeCount">0</span>/3 mistakes</span>
      </div>
      <div class="stat puzzle-id-stat">
        <span class="stat-icon">🎲</span>
        <span class="stat-val" id="puzzleLabel">—</span>
      </div>
    </div>

    <!-- Grid -->
    <div class="grid-wrapper">
      <div class="sudoku-grid" id="playGrid"></div>
    </div>

    <!-- Numpad -->
    <div class="numpad" id="playNumpad">
      <button class="num-btn" data-num="1">1</button>
      <button class="num-btn" data-num="2">2</button>
      <button class="num-btn" data-num="3">3</button>
      <button class="num-btn" data-num="4">4</button>
      <button class="num-btn" data-num="5">5</button>
      <button class="num-btn" data-num="6">6</button>
      <button class="num-btn" data-num="7">7</button>
      <button class="num-btn" data-num="8">8</button>
      <button class="num-btn" data-num="9">9</button>
      <button class="num-btn erase-btn" data-num="0">⌫</button>
    </div>

    <!-- Overlay messages -->
    <div class="overlay hidden" id="overlayPlay">
      <div class="overlay-card">
        <div class="overlay-icon" id="overlayIcon">💀</div>
        <h2 id="overlayTitle">Game Over</h2>
        <p id="overlayMsg">Too many mistakes!</p>
        <button class="action-btn" id="overlayRetry">Try Again</button>
      </div>
    </div>
  </section>

  <!-- ===================== SOLVE MODE ===================== -->
  <section class="panel" id="panelSolve">
    <div class="solve-intro">
      <p>Enter your puzzle below and click <strong>Solve</strong>. Leave unknowns empty.</p>
    </div>

    <div class="grid-wrapper">
      <div class="sudoku-grid" id="solveGrid"></div>
    </div>

    <div class="solve-actions">
      <button class="action-btn" id="btnSolve">⚡ Solve</button>
      <button class="action-btn secondary" id="btnClearSolve">Clear</button>
    </div>

    <div class="solve-result hidden" id="solveResult">
      <div class="result-badge" id="resultBadge"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Built with HTML · CSS · JS · PHP · MySQL · C++</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
